services:
  - type: web
    name: eapce27-laravel
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: >
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://eapce27-laravel.onrender.com
      - key: APP_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: eapce27-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: eapce27-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: eapce27-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: eapce27-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: eapce27-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database

databases:
  - name: eapce27-db
    plan: free
    databaseName: eapce27
